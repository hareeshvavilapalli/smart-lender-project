<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Application - Smart Lender</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-gradient">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="/">
                <i class="fas fa-building"></i> Smart Lender
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Form Section -->
    <div class="form-container">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <!-- Progress Bar -->
                    <div class="progress-indicator mb-5">
                        <div class="step-item active">
                            <div class="step-number">1</div>
                            <span>Personal Info</span>
                        </div>
                        <div class="step-item active">
                            <div class="step-number">2</div>
                            <span>Financial Details</span>
                        </div>
                        <div class="step-item active">
                            <div class="step-number">3</div>
                            <span>Get Result</span>
                        </div>
                    </div>

                    <!-- Form Card -->
                    <div class="form-card">
                        <div class="form-header">
                            <h2>Loan Application Form</h2>
                            <p>Quick and easy loan eligibility check</p>
                        </div>

                        <form action="/predict" method="POST" id="loanForm">
                            <!-- Personal Information Section -->
                            <div class="form-section">
                                <h5 class="section-heading">
                                    <i class="fas fa-user"></i> Personal Information
                                </h5>

                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label for="name" class="form-label">Full Name *</label>
                                        <input type="text" id="name" name="Name" class="form-control form-control-lg" 
                                               placeholder="John Doe" required>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="email" class="form-label">Email Address *</label>
                                        <input type="email" id="email" name="Email" class="form-control form-control-lg" 
                                               placeholder="john@example.com" required>
                                    </div>
                                </div>

                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label for="phone" class="form-label">Mobile Number *</label>
                                        <input type="text" id="phone" name="Phone" class="form-control form-control-lg" 
                                               placeholder="9876543210" required>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="gender" class="form-label">Gender *</label>
                                        <select id="gender" name="Gender" class="form-select form-select-lg" required>
                                            <option value="">Select Gender</option>
                                            <option>Male</option>
                                            <option>Female</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label for="married" class="form-label">Marital Status *</label>
                                        <select id="married" name="Married" class="form-select form-select-lg" required>
                                            <option value="">Select Status</option>
                                            <option>Yes</option>
                                            <option>No</option>
                                        </select>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="dependents" class="form-label">Dependents *</label>
                                        <select id="dependents" name="Dependents" class="form-select form-select-lg" required>
                                            <option value="">Select</option>
                                            <option>0</option>
                                            <option>1</option>
                                            <option>2</option>
                                            <option>3+</option>
                                        </select>
                                    </div>
                                </div>
                            </div>

                            <!-- Education & Employment Section -->
                            <div class="form-section">
                                <h5 class="section-heading">
                                    <i class="fas fa-briefcase"></i> Education & Employment
                                </h5>

                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label for="education" class="form-label">Education *</label>
                                        <select id="education" name="Education" class="form-select form-select-lg" required>
                                            <option value="">Select</option>
                                            <option>Graduate</option>
                                            <option>Not Graduate</option>
                                        </select>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="self_employed" class="form-label">Self Employed *</label>
                                        <select id="self_employed" name="Self_Employed" class="form-select form-select-lg" required>
                                            <option value="">Select</option>
                                            <option>Yes</option>
                                            <option>No</option>
                                        </select>
                                    </div>
                                </div>
                            </div>

                            <!-- Financial Information Section -->
                            <div class="form-section">
                                <h5 class="section-heading">
                                    <i class="fas fa-money-bill-wave"></i> Financial Information
                                </h5>

                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label for="applicant_income" class="form-label">Applicant Income (Annual) *</label>
                                        <input type="number" id="applicant_income" name="ApplicantIncome" 
                                               class="form-control form-control-lg" placeholder="0" required>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="coapplicant_income" class="form-label">Co-Applicant Income (Annual) *</label>
                                        <input type="number" id="coapplicant_income" name="CoapplicantIncome" 
                                               class="form-control form-control-lg" placeholder="0" required>
                                    </div>
                                </div>

                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label for="loan_amount" class="form-label">Loan Amount *</label>
                                        <input type="number" id="loan_amount" name="LoanAmount" 
                                               class="form-control form-control-lg" placeholder="0" required>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="loan_term" class="form-label">Loan Term (Months) *</label>
                                        <input type="number" id="loan_term" name="Loan_Amount_Term" 
                                               class="form-control form-control-lg" placeholder="360" required>
                                    </div>
                                </div>

                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label for="credit_history" class="form-label">Credit History *</label>
                                        <select id="credit_history" name="Credit_History" class="form-select form-select-lg" required>
                                            <option value="">Select</option>
                                            <option value="1">Good</option>
                                            <option value="0">Bad</option>
                                        </select>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="property_area" class="form-label">Property Area *</label>
                                        <select id="property_area" name="Property_Area" class="form-select form-select-lg" required>
                                            <option value="">Select</option>
                                            <option>Urban</option>
                                            <option>Semiurban</option>
                                            <option>Rural</option>
                                        </select>
                                    </div>
                                </div>
                            </div>

                            <!-- Submit Button -->
                            <div class="form-actions">
                                <button type="submit" class="btn btn-primary-custom btn-lg w-100">
                                    <i class="fas fa-check"></i> Check Eligibility
                                </button>
                                <a href="/" class="btn btn-outline-custom btn-lg w-100">
                                    <i class="fas fa-arrow-left"></i> Back to Home
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container text-center">
            <p>&copy; 2024 Smart Lender. All rights reserved. | Secure Loan Prediction System</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
